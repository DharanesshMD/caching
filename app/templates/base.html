<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>{% block page_title %}CacheWise{% endblock %} — CacheWise</title>
    {% block head_extra %}{% endblock %}
    <style>
      /* ── Reset & base ── */
      *, *::before, *::after { box-sizing: border-box; }
      body { font-family: system-ui, -apple-system, sans-serif; margin: 0; color: #1e293b; line-height: 1.6; }

      /* ── Layout ── */
      .app { display: flex; min-height: 100vh; }
      .sidebar { width: 230px; background: #0f172a; color: #fff; padding: 20px; flex-shrink: 0; }
      .sidebar h2 { margin: 0 0 4px; font-size: 1.3rem; }
      .sidebar .tagline { font-size: 0.75rem; color: #64748b; margin-bottom: 16px; }
      .sidebar nav { display: flex; flex-direction: column; gap: 2px; }
      .sidebar a { color: #94a3b8; text-decoration: none; display: block; padding: 8px 12px; border-radius: 6px; font-size: 0.92rem; transition: background .15s, color .15s; }
      .sidebar a:hover { background: #1e293b; color: #e2e8f0; }
      .sidebar a.active { background: #1e293b; color: #fff; font-weight: 600; }
      .sidebar .nav-section { font-size: 0.7rem; text-transform: uppercase; letter-spacing: .08em; color: #475569; margin: 16px 0 6px; padding-left: 12px; }
      main { flex: 1; padding: 32px 40px; max-width: 960px; overflow-y: auto; }

      /* ── Badge ── */
      .badge { padding: 6px 12px; border-radius: 6px; display: inline-block; font-weight: 600; font-size: 0.9rem; }
      .badge-hit { background: #dcfce7; color: #166534; }
      .badge-miss { background: #fee2e2; color: #991b1b; }
      .badge-semantic { background: #dbeafe; color: #1e40af; }

      /* ── Controls ── */
      .controls { margin: 12px 0; display: flex; gap: 12px; align-items: center; }
      .toggle { display: flex; align-items: center; gap: 8px; }
      .tooltip { cursor: help; border-bottom: 1px dotted #666; }
      button { cursor: pointer; padding: 6px 14px; border: 1px solid #cbd5e1; background: #fff; border-radius: 6px; font-size: 0.85rem; transition: background .15s; }
      button:hover { background: #f1f5f9; }
      pre { background: #f8fafc; padding: 14px; border-radius: 8px; overflow: auto; border: 1px solid #e2e8f0; font-size: 0.85rem; line-height: 1.5; }

      /* ── Hero ── */
      .hero { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); color: #fff; padding: 48px 40px; border-radius: 12px; margin-bottom: 32px; }
      .hero h1 { margin: 0 0 12px; font-size: 2rem; }
      .hero p { margin: 0; font-size: 1.1rem; color: #94a3b8; max-width: 600px; }

      /* ── Layer cards ── */
      .layer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin: 24px 0; }
      .layer-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px; transition: box-shadow .2s, transform .15s; text-decoration: none; color: inherit; }
      .layer-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); transform: translateY(-2px); }
      .layer-card h3 { margin: 0 0 8px; font-size: 1.05rem; }
      .layer-card p { margin: 0; font-size: 0.88rem; color: #64748b; }
      .layer-card .layer-icon { font-size: 1.6rem; margin-bottom: 8px; display: block; }

      /* ── Educational sections ── */
      .edu-section { margin: 24px 0; }
      .edu-section h2 { font-size: 1.35rem; margin: 0 0 12px; color: #0f172a; }
      .edu-section p { color: #475569; }

      details { margin: 16px 0; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
      details > summary { padding: 14px 18px; cursor: pointer; font-weight: 600; font-size: 1rem; background: #f8fafc; border-bottom: 1px solid transparent; user-select: none; list-style: none; }
      details > summary::-webkit-details-marker { display: none; }
      details > summary::before { content: "\25B6"; display: inline-block; margin-right: 10px; font-size: 0.7rem; transition: transform .2s; }
      details[open] > summary::before { transform: rotate(90deg); }
      details[open] > summary { border-bottom-color: #e2e8f0; }
      details .details-body { padding: 18px; }

      /* ── Flow diagram ── */
      .flow-diagram { display: flex; align-items: center; gap: 0; flex-wrap: wrap; padding: 16px 0; }
      .flow-step { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 10px 16px; font-size: 0.88rem; font-weight: 500; color: #1e40af; text-align: center; min-width: 100px; }
      .flow-step.active { background: #1e40af; color: #fff; border-color: #1e40af; }
      .flow-arrow { color: #94a3b8; font-size: 1.2rem; padding: 0 6px; flex-shrink: 0; }

      /* ── Pros & cons ── */
      .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 12px 0; }
      .pros-cons .pros, .pros-cons .cons { padding: 16px; border-radius: 8px; }
      .pros-cons .pros { background: #f0fdf4; border: 1px solid #bbf7d0; }
      .pros-cons .cons { background: #fef2f2; border: 1px solid #fecaca; }
      .pros-cons h4 { margin: 0 0 8px; font-size: 0.95rem; }
      .pros-cons ul { margin: 0; padding-left: 18px; font-size: 0.88rem; color: #475569; }
      .pros-cons li { margin-bottom: 4px; }

      /* ── Use cases ── */
      .use-cases { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin: 12px 0; }
      .use-case-card { background: #fefce8; border: 1px solid #fde68a; border-radius: 8px; padding: 14px; font-size: 0.88rem; }
      .use-case-card strong { display: block; margin-bottom: 4px; color: #92400e; }

      /* ── Key terms ── */
      .key-terms { margin: 12px 0; }
      .key-terms dl { margin: 0; }
      .key-terms dt { font-weight: 600; color: #0f172a; margin-top: 10px; font-size: 0.92rem; }
      .key-terms dd { margin: 2px 0 0 0; color: #475569; font-size: 0.88rem; }

      /* ── Demo panel ── */
      .demo-panel { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px; margin: 16px 0; }
      .demo-panel h3 { margin: 0 0 12px; font-size: 1.05rem; }

      /* ── Code inspector (tabbed) ── */
      .code-inspector { margin: 12px 0; }
      .code-tabs { display: flex; gap: 0; border-bottom: 2px solid #e2e8f0; }
      .code-tab { padding: 8px 16px; cursor: pointer; font-size: 0.82rem; font-weight: 500; color: #64748b; border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color .15s, border-color .15s; }
      .code-tab:hover { color: #1e293b; }
      .code-tab.active { color: #1e40af; border-bottom-color: #1e40af; }
      .code-panel-content { display: none; }
      .code-panel-content.active { display: block; }
      .code-panel-content pre { margin-top: 0; border-top-left-radius: 0; border-top-right-radius: 0; background: #0f172a; color: #e2e8f0; border-color: #1e293b; }

      /* ── Inspector ── */
      .inspector { margin-top: 8px; font-size: 0.9rem; color: #475569; }
      .inspector code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 0.82rem; }

      /* ── Sample prompts ── */
      .sample-prompts { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
      .sample-prompts button { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
      .sample-prompts button:hover { background: #dbeafe; }

      /* ── Stats bar ── */
      .stats-bar { display: flex; gap: 20px; margin: 16px 0; flex-wrap: wrap; }
      .stat-item { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px 18px; text-align: center; }
      .stat-item .stat-value { font-size: 1.3rem; font-weight: 700; color: #0f172a; }
      .stat-item .stat-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: .05em; }

      /* ── Pipeline visualization ── */
      .pipeline { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 12px 0; padding: 14px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0; }
      .pipeline-stage { padding: 8px 14px; border-radius: 6px; font-size: 0.82rem; font-family: monospace; }
      .pipeline-arrow { color: #94a3b8; font-weight: bold; }
    </style>
    <script>
      function toggleCache(el) {
        const state = el.dataset.state === 'on' ? 'off' : 'on';
        el.dataset.state = state;
        el.textContent = state === 'on' ? 'Cache: ON' : 'Cache: OFF';
        localStorage.setItem('cache_on', state);
      }

      function switchTab(inspectorId, tabId) {
        const inspector = document.getElementById(inspectorId);
        if (!inspector) return;
        inspector.querySelectorAll('.code-tab').forEach(t => t.classList.remove('active'));
        inspector.querySelectorAll('.code-panel-content').forEach(p => p.classList.remove('active'));
        var tab = inspector.querySelector('[data-tab="' + tabId + '"]');
        var panel = inspector.querySelector('#' + tabId);
        if (tab) tab.classList.add('active');
        if (panel) panel.classList.add('active');
      }

      function initDemo() {
        var state = localStorage.getItem('cache_on') || 'on';
        document.querySelectorAll('.cache-toggle').forEach(function(t) {
          t.dataset.state = state;
          t.textContent = state === 'on' ? 'Cache: ON' : 'Cache: OFF';
        });
      }

      document.addEventListener('DOMContentLoaded', function() {
        initDemo();
        // Highlight active sidebar link
        var path = window.location.pathname;
        document.querySelectorAll('.sidebar nav a').forEach(function(a) {
          if (a.getAttribute('href') === path) {
            a.classList.add('active');
          }
        });
      });
    </script>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h2>CacheWise</h2>
        <div class="tagline">Interactive Caching Guide</div>
        <nav>
          <a href="/">Home</a>
          <div class="nav-section">Cache Layers</div>
          <a href="/demo/browser">Browser</a>
          <a href="/demo/cdn">CDN</a>
          <a href="/demo/server">Server / Redis</a>
          <a href="/demo/in-memory">In-Memory</a>
          <a href="/demo/database">Database</a>
          <a href="/demo/ai-cache">AI Cache</a>
        </nav>
      </aside>
      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
